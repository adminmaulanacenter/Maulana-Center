<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Sedang Diperbaiki</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ── MENYALIN VARIABEL DAN THEME WARNA DARI CSS ANDA ── */
    :root {
      --color-bg: #fbf8f1;
      --color-surface: rgba(255, 255, 255, 0.82);
      --color-surface-strong: #ffffff;
      --color-surface-muted: #f4ede2;
      --color-border: rgba(125, 90, 40, 0.14);
      --color-text: #ffffff;
      --color-text-soft: rgba(255, 255, 255, 0.8);
      --color-primary: #a80f2d;
      --color-primary-deep: #7f0c23;
      --color-secondary: #d9b778;
      --color-emerald: #0f6d62;
      --shadow-soft: 0 18px 60px rgba(54, 26, 17, 0.08);
      --shadow-card: 0 24px 80px rgba(81, 35, 27, 0.12);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --font-body: "Plus Jakarta Sans", sans-serif;
      --font-display: "Cormorant Garamond", serif;
      --transition: 320ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-body);
      color: var(--color-text);
      background-color: #3a0a14; /* Sesuai base body CSS Anda */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      perspective: 1000px;
    }

    /* ── EFEK MESH GRADIENT (Sama persis dengan CSS Anda) ── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      background:
        radial-gradient(ellipse 120% 80% at 20% 0%, rgba(144, 22, 42, 0.72) 0%, transparent 60%),
        radial-gradient(ellipse 90% 70% at 85% 15%, rgba(127, 12, 35, 0.55) 0%, transparent 55%),
        radial-gradient(ellipse 100% 60% at 50% 100%, rgba(74, 12, 22, 0.80) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 5% 75%, rgba(15, 109, 98, 0.10) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 95% 80%, rgba(168, 15, 45, 0.30) 0%, transparent 50%),
        linear-gradient(160deg, #4a0c16 0%, #2a0810 40%, #3d0b18 70%, #1e0709 100%);
    }

    /* ── FLOATING BLOB DRIFT LAYER (Sama persis dengan CSS Anda) ── */
    body::after {
      content: "";
      position: fixed;
      inset: -20%;
      width: 140%;
      height: 140%;
      z-index: -2;
      background:
        radial-gradient(ellipse 55% 40% at 25% 30%, rgba(168, 15, 45, 0.28) 0%, transparent 65%),
        radial-gradient(ellipse 45% 35% at 75% 20%, rgba(217, 183, 120, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 45% at 60% 75%, rgba(127, 12, 35, 0.32) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 15% 80%, rgba(15, 109, 98, 0.09) 0%, transparent 55%),
        radial-gradient(ellipse 35% 28% at 88% 60%, rgba(217, 183, 120, 0.06) 0%, transparent 55%);
      animation: blobDrift 28s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes blobDrift {
      0% { transform: translate(0%, 0%) scale(1); opacity: 1; }
      50% { transform: translate(-0.8%, 1.4%) scale(0.985); opacity: 0.98; }
      100% { transform: translate(0.6%, 1%) scale(0.99); opacity: 1; }
    }

    /* ── AMBIENT GRID LAYER ── */
    .ambient-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      opacity: 0.1;
      background-image:
        linear-gradient(rgba(217, 183, 120, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(217, 183, 120, 0.06) 1px, transparent 1px);
      background-size: 72px 72px;
    }

    /* ── CONTAINER UTAMA (GLASSMORPHISM STYLE) ── */
    .maintenance-panel {
      max-width: 580px;
      width: calc(100% - 40px);
      text-align: center;
      padding: 60px 40px;
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, rgba(168, 15, 45, 0.25) 0%, rgba(93, 10, 24, 0.4) 100%);
      box-shadow: var(--shadow-card), inset 0 2px 4px rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      animation: panelPopIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes panelPopIn {
      from { transform: scale(0.8) translateY(40px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    /* ── EMBLEM ANIMASI / LOGO MEKANIK ── */
    .emblem-container {
      margin-bottom: 35px;
      position: relative;
      display: inline-block;
    }

    .maintenance-emblem {
      width: 100px;
      height: 100px;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(217, 183, 120, 0.2));
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: grid;
      place-items: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      position: relative;
      animation: floatGraphic 4s ease-in-out infinite;
    }

    /* Efek Ring Pulsa Glowing */
    .maintenance-emblem::after {
      content: "";
      position: absolute;
      inset: -8px;
      border: 2px solid var(--color-secondary);
      border-radius: calc(var(--radius-lg) + 8px);
      opacity: 0;
      animation: pulseGlow 2.5s cubic-bezier(0.24, 1, 0.32, 1) infinite;
    }

    /* Ikon Gear SVG */
    .maintenance-emblem svg {
      width: 48px;
      height: 48px;
      fill: var(--color-secondary);
      filter: drop-shadow(0 4px 12px rgba(217, 183, 120, 0.4));
      animation: spinGear 8s linear infinite;
    }

    @keyframes spinGear {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes floatGraphic {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulseGlow {
      0% { transform: scale(0.9); opacity: 0.8; }
      100% { transform: scale(1.2); opacity: 0; }
    }

    /* ── BADGE LABEL PERBAIKAN ── */
    .status-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(217, 183, 120, 0.25);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-secondary);
      margin-bottom: 24px;
      font-weight: 600;
    }

    .status-label::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ffb700;
      box-shadow: 0 0 10px #ffb700;
      animation: blinkDot 1.5s infinite alternate;
    }

    @keyframes blinkDot {
      from { opacity: 0.4; }
      to { opacity: 1; }
    }

    /* ── TYPOGRAPHY / TEKS ── */
    h1 {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      font-weight: 600;
      margin: 0 0 16px 0;
      line-height: 1.1;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff 30%, var(--color-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: var(--color-text-soft);
      font-size: 1.05rem;
      line-height: 1.7;
      margin: 0 0 35px 0;
      max-width: 48ch;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── LOADING BAR/LINE ANIMASI (Khas CSS Anda) ── */
    .loading-line {
      width: 220px;
      height: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      margin: 0 auto 40px auto;
    }

    .loading-line span {
      display: block;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, var(--color-secondary), transparent);
      animation: loadingMove 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes loadingMove {
      0% { transform: translateX(-150%); }
      100% { transform: translateX(250%); }
    }

    /* ── FOOTER / COPY ── */
    .footer-note {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.4);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="ambient-grid"></div>

  <div class="maintenance-panel">
    
    <div class="emblem-container">
      <div class="maintenance-emblem">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l-.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l-.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
        </svg>
      </div>
    </div>

    <div>
      <div class="status-label">Pemeliharaan Sistem</div>
    </div>

    <h1>Website Sedang Diperbaiki</h1>
    
    <p>Kami sedang melakukan peningkatan performa dan memperbarui sistem untuk memberikan pengalaman terbaik untuk Anda. Mohon tunggu beberapa saat lagi.</p>

    <div class="loading-line">
      <span></span>
    </div>

    <div class="footer-note">
      &copy; 2026 Hak Cipta Dilindungi.
    </div>

  </div>

</body>
